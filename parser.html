<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interpréteur interactif d'algorithmes pédagogiques en pseudo-code. Exécutez des programmes algorithmiques avec des fonctions usuelles (chr, ord, arrondi, etc.).">
  <title>Parse Algorithme - Interpréteur en ligne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CodeMirror 5 via CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.css">

  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/cm-theme.css">
  <link rel="stylesheet" href="assets/css/parser.css">
</head>

<body>
  <div class="app-layout" id="app">

    <!-- ═══ TOOLBAR ═══ -->
    <div class="toolbar">
      <div class="toolbar-left">
        <a href="index.html" class="back-link">← Fonctions usuelles</a>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-primary" @click="exec()">▶ Exécuter</button>
        <button class="btn btn-secondary" @click="stepExec()">⏭ Pas à pas</button>
        <button class="btn btn-secondary" id="btn-step-next" disabled @click="stepNext()">⏩ Pas suivant</button>
        <button class="btn btn-secondary" id="btn-step-resume" disabled @click="stepResume()">▶ Continuer</button>
        <button class="btn btn-secondary" id="btn-step-stop" disabled @click="stepStop()">⏹ Arrêter</button>
        <button class="btn btn-secondary" onclick="exportAlgorithmToHTML()">💾 Exporter HTML</button>
      </div>
    </div>

    <!-- ═══ ÉDITEUR ═══ -->
    <div class="editor-panel">
      <div class="panel-header">
        <label>Algorithme</label>
      </div>
      <div class="panel-body">
        <div id="editor-container"></div>
      </div>
    </div>

    <!-- ═══ SORTIE ═══ -->
    <div class="output-panel">
      <div class="panel-header">
        <label>Sortie / Saisie</label>
        <div class="vars-display" id="vars-display"></div>
      </div>
      <div class="panel-body" id="sortie" placeholder="La sortie s'affichera ici..."></div>
    </div>

  </div>

  <!-- CodeMirror 5 via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/mode/simple.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.js"></script>

  <!-- Mode Algorithm personnalisé -->
  <script src="assets/js/cm-algorithm-mode.js"></script>

  <script src="assets/js/vue.min.js"></script>
  <script src="assets/js/functions.js"></script>
  <script src="assets/js/algorithm-core.js"></script>
  <script src="assets/js/parser.js"></script>
  <script src="assets/js/export-html.js"></script>
</body>

</html>
